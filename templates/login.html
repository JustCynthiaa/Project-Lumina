<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Lumina</title>
    <link rel="icon" type="image/png" href="/static/images/logoTec.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='main_styles.css') }}">
    <style>
        /* Estilos específicos para la caja de login centrada */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Previene que el input se salga de la caja */
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #003366; /* Azul TecNM */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        .login-box button:hover {
            background-color: #336699;
        }
        .error-msg {
            color: #d9534f;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            font-size: 0.9em;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="color: #003366; margin-top: 0;">Ingreso a Lumina</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="error-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <input type="text" name="usuario" placeholder="Usuario" required autofocus>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
