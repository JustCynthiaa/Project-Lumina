<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Lumina</title>
    <!-- Importamos tus estilos base -->
    <link rel="stylesheet" href="{{ url_for('static', filename='main_styles.css') }}">
    <style>
        /* Estilos específicos para la caja de login centrada */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .login-box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #003366; /* Azul TecNM */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
        }
        .login-box button:hover {
            background-color: #336699;
        }
        .error-msg {
            color: red;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="color: #003366; margin-top: 0;">Ingreso a Lumina</h2>
        
        <!-- Mensajes de error (Flash) -->
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
            {% if messages %}
                {% for message in messages %}
                    <div class="error-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- El formulario que envía los datos por POST a la ruta /login -->
        <form action="{{ url_for('login') }}" method="POST">
            <input type="text" name="nombre" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
