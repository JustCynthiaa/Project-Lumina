<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador | LUMINA</title>
    <link rel="icon" type="image/png" href="/static/images/logoTec.png">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tecblue: '#1B396A',
                        tecaccent: '#60A5FA',
                        bodybg: '#F3F4F6'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bodybg text-gray-800 min-h-screen flex flex-col justify-center items-center font-sans p-4 relative overflow-hidden">

<div class="absolute top-0 left-0 w-full bg-white px-8 py-3 flex items-center justify-between border-b border-gray-200 select-none z-50 hidden sm:flex">
        <div class="flex items-center space-x-4">
            <img src="/static/images/gob.png" alt="Gobierno de México" class="h-12 w-auto object-contain">
            
            <div class="h-10 w-[1px] bg-[#bc955c]/40"></div>
            
            <img src="/static/images/educacion.png" alt="Secretaría de Educación Pública" class="h-12 w-auto object-contain">
            
            <div class="h-10 w-[1px] bg-[#bc955c]/40"></div>
            
            <img src="/static/images/logo_tecnm.png" alt="Tecnológico Nacional de México" class="h-12 w-auto object-contain">
        </div>

        <div>
            <img src="/static/images/logo_itiguala.png" alt="Instituto Tecnológico de Iguala" class="h-14 w-auto object-contain">
        </div>
    </div>

    <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #1B396A 1px, transparent 0); background-size: 24px 24px;"></div>

    <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl border border-gray-100 p-8 relative z-10">
        
        <div class="absolute top-0 left-0 w-full h-1.5 bg-tecblue rounded-t-2xl"></div>

        <div class="flex flex-col items-center mb-8 mt-2">
            <div class="bg-gray-50 border border-gray-100 p-3 rounded-full flex items-center justify-center h-16 w-16 shadow-sm mb-3">
                <img src="/static/images/logoTec.png" alt="TecNM" class="max-h-full max-w-full drop-shadow-sm">
                <i class="ph ph-shield-check text-3xl text-tecblue hidden"></i>
            </div>
            <h2 class="text-xl font-black tracking-widest text-tecblue leading-none">LUMINA</h2>
            <p class="text-[10px] text-gray-400 tracking-[0.2em] uppercase font-bold mt-1.5">Panel de Administración</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-5 space-y-2">
                {% for category, message in messages %}
                    {% if category == 'error' %}
                        <div class="bg-red-50 border-l-4 border-red-500 p-3 rounded-r flex items-start gap-2">
                            <i class="ph ph-warning-circle text-red-500 text-lg mt-0.5"></i>
                            <p class="text-xs text-red-700 font-medium">{{ message }}</p>
                        </div>
                    {% else %}
                        <div class="bg-blue-50 border-l-4 border-tecblue p-3 rounded-r flex items-start gap-2">
                            <i class="ph ph-info text-tecblue text-lg mt-0.5"></i>
                            <p class="text-xs text-blue-800 font-medium">{{ message }}</p>
                        </div>
                    {% endif %}
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="flex flex-col gap-4">
            
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1.5 ml-1">Usuario</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-user text-gray-400 text-lg"></i>
                    </div>
                    <input type="text" name="usuario" placeholder="Ingrese su usuario" required autofocus
                           class="w-full bg-gray-50 border border-gray-300 text-gray-800 text-sm rounded-lg pl-10 pr-3 py-2.5 outline-none focus:border-tecblue focus:ring-1 focus:ring-tecblue transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1.5 ml-1">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-lock-key text-gray-400 text-lg"></i>
                    </div>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full bg-gray-50 border border-gray-300 text-gray-800 text-sm rounded-lg pl-10 pr-3 py-2.5 outline-none focus:border-tecblue focus:ring-1 focus:ring-tecblue transition-all">
                </div>
            </div>

            <button type="submit" class="mt-2 w-full bg-tecblue hover:bg-[#152b52] text-white font-bold py-3 rounded-lg shadow-md transition-transform hover:-translate-y-0.5 flex items-center justify-center gap-2 text-sm">
                Iniciar Sesión 
            </button>
        </form>

    </div>

    <div class="mt-6 z-10">
        <a href="{{ url_for('index') }}" class="flex items-center gap-1.5 text-xs font-semibold text-gray-500 hover:text-tecblue transition-colors bg-white/50 px-4 py-2 rounded-full border border-gray-200">
            <i class="ph ph-arrow-left"></i> Volver
        </a>
    </div>

</body>
</html>
