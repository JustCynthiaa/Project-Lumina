<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA | Registro de Estudiante</title>
    <link rel="icon" type="image/png" href="/static/images/logoTec.png">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tecblue: '#1B396A',
                        tecaccent: '#60A5FA',
                        bodybg: '#F3F4F6',
                        panelbg: '#FFFFFF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-bodybg text-gray-800 min-h-screen flex flex-col font-sans">

    <header class="bg-tecblue text-white shadow-md border-b-2 border-tecaccent relative z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-5">
                <div class="flex items-center justify-center h-16 w-16">
                    <img src="/static/images/logoTec.png" alt="TecNM" class="max-h-full max-w-full object-contain drop-shadow-md">
                </div>
                <div class="flex flex-col justify-center">
                    <h1 class="text-2xl font-black tracking-widest leading-none">LUMINA</h1>
                    <p class="text-[10px] text-tecaccent tracking-[0.2em] uppercase font-bold mt-1">Registro de Estudiantes</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- COLUMNA IZQUIERDA: CÁMARA -->
        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="flex items-center gap-3 pb-2 border-b-2 border-gray-200">
                <i class="ph ph-camera text-2xl text-tecblue"></i>
                <h2 class="text-lg font-bold text-gray-700 uppercase tracking-wide">Captura de Rostro</h2>
            </div>

            <div class="bg-panelbg p-6 rounded-lg shadow-sm border border-gray-200 flex flex-col h-full">
                <div id="camera-container" class="bg-gray-900 border-2 border-gray-800 rounded flex flex-col items-center justify-center aspect-[4/3] relative overflow-hidden shadow-inner w-full">
                    
                    <video id="video-feed" autoplay playsinline class="w-full h-full object-cover hidden transform scale-x-[-1]"></video>
                    <canvas id="overlay" class="absolute inset-0 w-full h-full object-cover hidden z-10 transform scale-x-[-1]"></canvas>

                    <div id="camera-placeholder" class="flex flex-col items-center justify-center absolute inset-0 bg-gray-50 border-2 border-dashed border-gray-300 rounded z-20 p-4">
                        <i class="ph ph-user-focus text-7xl text-gray-300 mb-2"></i>
                        <p id="placeholder-text" class="text-xs font-semibold text-gray-400 text-center uppercase tracking-wider">Busca tu registro primero</p>
                    </div>

                    <canvas id="canvas-foto" class="hidden"></canvas>

                    <div id="progress-container" class="absolute bottom-0 left-0 w-full h-3 bg-gray-800/50 hidden z-30">
                        <div id="progress-bar" class="h-full bg-green-500 transition-all duration-100 ease-linear shadow-[0_0_10px_rgba(16,185,129,0.8)]" style="width: 0%"></div>
                    </div>
                    
                    <div id="instruccion-camara" class="absolute top-4 bg-black/70 text-white text-xs font-bold px-4 py-2 rounded-full hidden z-30 tracking-wide backdrop-blur-sm">
                        Buscando rostro...
                    </div>
                </div>
            </div>
        </div>

        <!-- COLUMNA DERECHA: DATOS -->
        <div class="lg:col-span-7 flex flex-col gap-6">
            
            <!-- SECCIÓN DE BÚSQUEDA -->
            <div id="contenedor-busqueda" class="flex flex-col gap-6">
                <div class="flex items-center gap-3 pb-2 border-b-2 border-gray-200">
                    <i class="ph ph-magnifying-glass text-2xl text-tecblue"></i>
                    <h2 class="text-lg font-bold text-gray-700 uppercase tracking-wide">Búsqueda de Estudiante</h2>
                </div>

                <div class="relative z-40">
                    <div class="relative">
                        <i class="ph ph-magnifying-glass absolute left-4 top-3.5 text-xl text-gray-400"></i>
                        <input type="text" id="busqueda-input" oninput="buscarEstudianteLive(this.value)" placeholder="Ingresa tu número de control o nombre..." class="w-full bg-white border-2 border-gray-300 text-gray-800 pl-12 pr-4 py-3 rounded-lg outline-none text-sm font-medium focus:border-tecblue transition-all shadow-sm">
                    </div>
                    <ul id="resultados-busqueda" class="absolute w-full bg-white mt-1 rounded-lg shadow-2xl border border-gray-200 max-h-60 overflow-y-auto hidden z-50 p-1">
                    </ul>
                </div>
            </div>

            <!-- FICHA DEL ALUMNO -->
            <div class="bg-panelbg p-6 rounded-lg shadow-sm border border-gray-200 flex-1 flex flex-col justify-between">
                <div>
                    <h3 id="titulo-ficha" class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Verifica tu Información</h3>
                    
                    <form id="form-alumno" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col relative">
                            <label class="text-xs font-bold text-gray-600 mb-1">Número de Control</label>
                            <input type="text" id="inp-no-control" oninput="verificarNoControlLive(this.value)" readonly class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed font-semibold transition-colors uppercase">
                            <p id="msg-no-control" class="text-[10px] text-red-500 font-bold mt-1 hidden absolute -bottom-4">Este número de control ya está registrado.</p>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-xs font-bold text-gray-600 mb-1">Nombre(s)</label>
                            <input type="text" id="inp-nombre" oninput="this.value = this.value.toUpperCase()" readonly class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed uppercase">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-xs font-bold text-gray-600 mb-1">Apellido Paterno</label>
                            <input type="text" id="inp-paterno" oninput="this.value = this.value.toUpperCase()" readonly class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed uppercase">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-xs font-bold text-gray-600 mb-1">Apellido Materno</label>
                            <input type="text" id="inp-materno" oninput="this.value = this.value.toUpperCase()" readonly class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed uppercase">
                        </div>
                        <div class="flex flex-col md:col-span-2">
                            <label class="text-xs font-bold text-gray-600 mb-1">Carrera</label>
                            <select id="inp-carrera" disabled class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed appearance-none">
                                <option value="">Selecciona...</option>
                                <option value="Ingeniería En Sistemas Computacionales">Ingeniería En Sistemas Computacionales</option>
                                <option value="Ingeniería Industrial">Ingeniería Industrial</option>
                                <option value="Ingeniería Informática">Ingeniería Informática</option>
                                <option value="Ingeniería En Gestión Empresarial">Ingeniería En Gestión Empresarial</option>
                                <option value="Contador Publico">Contador Publico</option>
                            </select>
                        </div>
                       <div class="flex flex-col">
                            <label class="text-xs font-bold text-gray-600 mb-1">Semestre</label>
                            <select id="inp-semestre" disabled class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed appearance-none">
                                <option value="">Selecciona...</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                            </select>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-xs font-bold text-gray-600 mb-1">Correo Electrónico</label>
                            <input type="email" id="inp-email" readonly class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed">
                        </div>
                    </form>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-100 flex flex-col gap-4">
                    <div id="estadoFicha" class="flex items-center gap-2 text-gray-500 text-sm bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <i class="ph ph-info text-lg"></i>
                        <span>Estado: <span id="txt-estado" class="font-semibold text-gray-600">Por favor, búscate en la lista superior.</span></span>
                    </div>

                    <div class="flex gap-3 mt-2">
                        <a href="javascript:history.back()" class="w-1/3 bg-white hover:bg-gray-100 border border-gray-300 text-gray-700 font-bold py-3 rounded transition-colors text-center shadow-sm flex items-center justify-center gap-2 text-sm">
                            <i class="ph ph-x text-lg"></i> Cancelar
                        </a>
                        <button type="button" id="btn-guardar" onclick="encenderCamara()" disabled class="w-2/3 bg-gray-300 text-gray-500 font-bold py-3 rounded transition-colors flex items-center justify-center gap-2 text-sm shadow-sm cursor-not-allowed">
                            <i class="ph ph-scan text-lg"></i> Iniciar Escaneo y Guardar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // SOLUCIÓN AL ERROR DE FETCH: Se declara aquí mismo de forma segura.
        const getBaseUrl = () => {
            if (window.location.protocol === 'blob:' || window.location.protocol === 'file:' || window.location.origin === 'null') {
                return 'http://127.0.0.1:5000';
            }
            return '';
        };

        let streamActivo = null;
        let detectionInterval = null;
        let isDetecting = false;
        let quietoProgress = 0;
        let lastCenter = null;
        let modelosCargados = false;
        let datosCompletos = false;
        let timeoutVerificacion = null;
        let noControlValido = true;
        let errorNoControlMsg = ""; 

        const urlParams = new URLSearchParams(window.location.search);
        const esModoNuevo = urlParams.get('modo') === 'nuevo';

        document.addEventListener("DOMContentLoaded", async () => {
            if (esModoNuevo) {
                configurarModoNuevo();
            }

            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights');
                modelosCargados = true;
            } catch (err) {
                console.error("Error descargando IA:", err);
            }
        });

        function configurarModoNuevo() {
            document.getElementById('contenedor-busqueda').classList.add('hidden');
            document.getElementById('titulo-ficha').innerText = "INGRESA LOS DATOS DEL NUEVO ESTUDIANTE";
            document.getElementById('placeholder-text').innerText = "Llena tus datos primero";

            const inputsId = ['inp-no-control', 'inp-nombre', 'inp-paterno', 'inp-materno', 'inp-carrera', 'inp-semestre', 'inp-email'];
            
            inputsId.forEach(id => {
                const el = document.getElementById(id);
                if (el.tagName === 'SELECT') {
                    el.disabled = false;
                } else {
                    el.readOnly = false;
                }
                el.className = "bg-white border-2 border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none focus:border-tecblue transition-all font-medium appearance-none";
            });

            const estadoBox = document.getElementById('estadoFicha');
            estadoBox.className = "flex items-center gap-2 text-blue-700 text-sm bg-blue-50 p-3 rounded-lg border border-blue-200";
            document.getElementById('txt-estado').innerText = "Por favor, llena todos los campos para registrar al nuevo alumno.";
            
            validarFormularioCompleto();
        }

        async function buscarEstudianteLive(query) {
            const lista = document.getElementById('resultados-busqueda');
            if (query.trim().length < 2) {
                lista.classList.add('hidden');
                return;
            }

            try {
                const response = await fetch(`${getBaseUrl()}/api/buscar_alumnos?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    throw new Error("Respuesta del servidor no fue exitosa");
                }
                
                const alumnos = await response.json();

                lista.innerHTML = '';
                if (alumnos.length === 0) {
                    lista.innerHTML = `<li class="p-3 text-xs text-gray-400 font-medium text-center">No se encontraron coincidencias</li>`;
                    lista.classList.remove('hidden');
                    return;
                }

                alumnos.forEach(al => {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center px-4 py-2.5 hover:bg-blue-50 rounded-md cursor-pointer text-sm font-medium text-gray-700 transition-colors border-b border-gray-50 last:border-0";
                    li.innerHTML = `
                        <span class="font-bold text-tecblue">${al.no_control}</span>
                        <span class="text-gray-600 font-normal uppercase text-xs">${al.nombre} ${al.apellido_paterno}</span>
                    `;
                    li.onclick = () => seleccionarAlumno(al);
                    lista.appendChild(li);
                });
                lista.classList.remove('hidden');

            } catch (err) {
                console.error("Error en autocompletado:", err);
                lista.innerHTML = `<li class="p-3 text-xs text-red-500 font-medium text-center">Error de conexión. Verifica el Backend.</li>`;
                lista.classList.remove('hidden');
            }
        }

        function seleccionarAlumno(al) {
            document.getElementById('resultados-busqueda').classList.add('hidden');
            document.getElementById('busqueda-input').value = `${al.no_control} - ${al.nombre}`;

            configurarCampo('inp-no-control', al.no_control);
            configurarCampo('inp-nombre', al.nombre);
            configurarCampo('inp-paterno', al.apellido_paterno);
            configurarCampo('inp-materno', al.apellido_materno);
            configurarCampo('inp-carrera', al.carrera, true); // True porque es select
            configurarCampo('inp-semestre', al.semestre, true); // True porque es select
            configurarCampo('inp-email', al.email);

            validarFormularioCompleto();
        }

        function configurarCampo(id, valorBD, isSelect = false) {
            const element = document.getElementById(id);
            const valorLimpio = valorBD ? valorBD.toString().trim() : '';
            const esInvalido = valorLimpio.toLowerCase() === 'por definir' || valorLimpio === '';

            if (esInvalido) {
                element.value = ''; 
                if (isSelect) element.disabled = false;
                else element.readOnly = false;
                
                element.className = "bg-blue-50 border-2 border-blue-400 text-blue-900 text-sm rounded px-3 py-2.5 outline-none font-medium focus:bg-white transition-all animate-pulse appearance-none";
            } else {
                if (isSelect) {
                    let coincidencia = false;
                    for (let i = 0; i < element.options.length; i++) {
                        if (element.options[i].value.toLowerCase() === valorLimpio.toLowerCase()) {
                            element.selectedIndex = i;
                            coincidencia = true;
                            break;
                        }
                    }
                    
                    if (!coincidencia) {
                        element.value = '';
                        element.disabled = false; 
                        element.className = "bg-blue-50 border-2 border-blue-400 text-blue-900 text-sm rounded px-3 py-2.5 outline-none font-medium focus:bg-white transition-all animate-pulse appearance-none";
                        return; 
                    }
                    element.disabled = true;
                } else {
                    element.value = valorLimpio;
                    element.readOnly = true;
                }
                
                element.className = "bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded px-3 py-2.5 outline-none cursor-not-allowed appearance-none";
            }
        }

        async function verificarNoControlLive(query) {
            if (!esModoNuevo) return;
            
            const msg = document.getElementById('msg-no-control');
            const inp = document.getElementById('inp-no-control');
            
            const start = inp.selectionStart;
            inp.value = inp.value.toUpperCase();
            inp.setSelectionRange(start, start);
            
            const val = inp.value.trim();

            if (val.length === 0) {
                msg.classList.add('hidden');
                inp.classList.remove('border-red-500', 'bg-red-50', 'text-red-700');
                noControlValido = false;
                errorNoControlMsg = "";
                validarFormularioCompleto();
                return;
            }

            clearTimeout(timeoutVerificacion);
            timeoutVerificacion = setTimeout(async () => {
                
                // Expresion regular validación
                const regexControl = /^[A-Z]?[0-9]{8}$/;
                if (!regexControl.test(val)) {
                    msg.innerText = "Formato inválido (Ej: 12345678 o C12345678)";
                    msg.classList.remove('hidden');
                    inp.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                    noControlValido = false;
                    errorNoControlMsg = "El formato del número de control es inválido.";
                    validarFormularioCompleto();
                    return; 
                }

                try {
                    // AQUÍ USAMOS getBaseUrl() de manera segura
                    const response = await fetch(`${getBaseUrl()}/api/buscar_alumnos?query=${encodeURIComponent(val)}`);
                    if (!response.ok) throw new Error("Error interno en el servidor Backend");
                    const alumnos = await response.json();
                    
                    const existe = alumnos.some(al => al.no_control.toString().toUpperCase() === val);
                    
                    if (existe) {
                        msg.innerText = "Este número de control ya está registrado.";
                        msg.classList.remove('hidden');
                        inp.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                        noControlValido = false;
                        errorNoControlMsg = "El número de control ingresado ya existe en el sistema.";
                    } else {
                        msg.classList.add('hidden');
                        inp.classList.remove('border-red-500', 'bg-red-50', 'text-red-700');
                        noControlValido = true;
                        errorNoControlMsg = "";
                    }
                    validarFormularioCompleto();
                } catch (err) {
                    console.error("Error al verificar número de control:", err);
                }
            }, 600); 
        }

        function validarFormularioCompleto() {
            const baseInputs = ['inp-nombre', 'inp-paterno', 'inp-materno', 'inp-carrera', 'inp-semestre', 'inp-email'];
            const inputsAValidar = esModoNuevo ? ['inp-no-control', ...baseInputs] : baseInputs;
            
            let faltaDato = false;

            inputsAValidar.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.value.trim() === '') {
                    faltaDato = true;
                }
            });

            const btn = document.getElementById('btn-guardar');
            const estadoBox = document.getElementById('estadoFicha');
            const txtEstado = document.getElementById('txt-estado');

            if (faltaDato || !noControlValido) {
                datosCompletos = false;
                btn.disabled = true;
                btn.className = "w-2/3 bg-gray-200 text-gray-400 font-bold py-3 rounded transition-colors flex items-center justify-center gap-2 text-sm shadow-sm cursor-not-allowed border border-gray-300";
                btn.innerHTML = '<i class="ph ph-warning text-lg"></i> Completa tu información';
                
                estadoBox.className = "flex items-center gap-2 text-sm p-3 rounded-lg border";
                
                if (!noControlValido && document.getElementById('inp-no-control').value.trim() !== '' && errorNoControlMsg !== "") {
                    estadoBox.classList.add('text-red-700', 'bg-red-50', 'border-red-200');
                    txtEstado.innerText = errorNoControlMsg;
                } else {
                    estadoBox.classList.add('text-blue-700', 'bg-blue-50', 'border-blue-200');
                    txtEstado.innerText = esModoNuevo 
                        ? "Por favor, completa todos los campos del formulario." 
                        : "Por favor, completa los campos marcados en azul.";
                }
            } else {
                datosCompletos = true;
                btn.disabled = false;
                btn.className = "w-2/3 bg-tecblue hover:bg-[#152b52] text-white font-bold py-3 rounded transition-colors flex items-center justify-center gap-2 text-sm shadow-sm cursor-pointer";
                btn.innerHTML = '<i class="ph ph-scan text-lg"></i> Iniciar Escaneo y Guardar';
                
                estadoBox.className = "flex items-center gap-2 text-green-700 text-sm bg-green-50 p-3 rounded-lg border border-green-200";
                txtEstado.innerText = "Datos completos. Haz clic en Guardar para encender la cámara.";
            }
        }

        document.getElementById('form-alumno').addEventListener('input', validarFormularioCompleto);
        document.getElementById('form-alumno').addEventListener('change', validarFormularioCompleto);

        async function encenderCamara() {
            if (!modelosCargados || !datosCompletos) return;

            const video = document.getElementById('video-feed');
            const placeholder = document.getElementById('camera-placeholder');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('btn-guardar');

            try {
                streamActivo = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = streamActivo;
                
                placeholder.classList.add('hidden');
                video.classList.remove('hidden');
                overlay.classList.remove('hidden');

                btn.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i> Escaneando rostro...';
                btn.className = "w-2/3 bg-blue-500 text-white font-bold py-3 rounded transition-colors flex items-center justify-center gap-2 text-sm shadow-sm cursor-default";
                btn.disabled = true;
                
                video.onloadeddata = () => {
                    setTimeout(() => { iniciarEscaneo(); }, 500);
                };

            } catch (error) {
                console.error("Error cámara: ", error);
                alert("No se pudo iniciar la cámara.");
            }
        }

        function apagarCamara() {
            const video = document.getElementById('video-feed');
            const overlay = document.getElementById('overlay');
            
            isDetecting = false;
            clearInterval(detectionInterval);
            
            if (streamActivo) {
                streamActivo.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        function iniciarEscaneo() {
            isDetecting = true;
            quietoProgress = 0;
            lastCenter = null;
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('instruccion-camara').classList.remove('hidden');
            document.getElementById('instruccion-camara').innerText = "Buscando rostro...";
            document.getElementById('progress-bar').style.width = '0%';
            
            procesarVideoEnVivo();
        }

        async function procesarVideoEnVivo() {
            const video = document.getElementById('video-feed');
            const canvas = document.getElementById('overlay');
            
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                if (isDetecting) setTimeout(procesarVideoEnVivo, 500);
                return;
            }

            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);

            const opcionesSensibles = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.2 });

            detectionInterval = setInterval(async () => {
                if (!isDetecting) return;

                try {
                    const detections = await faceapi.detectAllFaces(video, opcionesSensibles);
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);

                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (resizedDetections.length === 1) {
                        const box = resizedDetections[0].box;
                        
                        const drawBox = new faceapi.draw.DrawBox(box, { 
                            lineWidth: 3, 
                            boxColor: quietoProgress > 50 ? '#10B981' : '#3B82F6' 
                        });
                        drawBox.draw(canvas);

                        const center = { x: box.x + box.width / 2, y: box.y + box.height / 2 };
                        if (lastCenter) {
                            const diffX = Math.abs(center.x - lastCenter.x);
                            const diffY = Math.abs(center.y - lastCenter.y);
                            
                            if (diffX < 15 && diffY < 15) {
                                quietoProgress += 8;
                                document.getElementById('instruccion-camara').innerText = "¡Quédate quieto!";
                            } else {
                                quietoProgress = 0; 
                                document.getElementById('instruccion-camara').innerText = "Te estás moviendo...";
                            }
                        }
                        lastCenter = center;

                        document.getElementById('progress-bar').style.width = Math.min(quietoProgress, 100) + '%';

                        if (quietoProgress >= 100) {
                            isDetecting = false;
                            clearInterval(detectionInterval);
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            document.getElementById('instruccion-camara').innerText = "¡Procesando Registro!";
                            guardarRegistroFinal();
                        }

                    } else if (resizedDetections.length > 1) {
                        quietoProgress = 0;
                        document.getElementById('progress-bar').style.width = '0%';
                        document.getElementById('instruccion-camara').innerText = "Hay más de un rostro";
                    } else {
                        quietoProgress = 0;
                        document.getElementById('progress-bar').style.width = '0%';
                        document.getElementById('instruccion-camara').innerText = "Acércate a la cámara";
                        lastCenter = null;
                    }
                } catch (err) {
                    console.error("Error escaneo:", err);
                }
            }, 150);
        }

        async function guardarRegistroFinal() {
            const video = document.getElementById('video-feed');
            const canvas = document.getElementById('canvas-foto');
            const context = canvas.getContext('2d');
            const txtEstado = document.getElementById('txt-estado');
            const estadoBox = document.getElementById('estadoFicha');
            const btn = document.getElementById('btn-guardar');

            estadoBox.className = "flex items-center gap-2 text-tecblue text-sm bg-blue-50 p-3 rounded-lg border border-blue-200";
            txtEstado.innerHTML = `<i class="ph ph-spinner animate-spin text-lg"></i> Guardando alumno en la Base de Datos...`;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imagenBase64 = canvas.toDataURL('image/jpeg', 0.9);

            const payload = {
                no_control: document.getElementById('inp-no-control').value,
                nombre: document.getElementById('inp-nombre').value,
                apellido_paterno: document.getElementById('inp-paterno').value,
                apellido_materno: document.getElementById('inp-materno').value,
                carrera: document.getElementById('inp-carrera').value,
                semestre: document.getElementById('inp-semestre').value,
                email: document.getElementById('inp-email').value,
                imagen: imagenBase64,
                es_nuevo: esModoNuevo
            };

            try {
                const response = await fetch(`${getBaseUrl()}/api/guardar_alumno`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                document.getElementById('progress-container').classList.add('hidden');
                document.getElementById('instruccion-camara').classList.add('hidden');

                if (data.exito) {
                    apagarCamara();
                    estadoBox.className = "flex items-center gap-2 text-green-600 text-sm bg-green-50 p-3 rounded-lg border border-green-100 transition-all duration-300";
                    txtEstado.innerHTML = `<b>¡Éxito!</b> ${data.mensaje} Redirigiendo...`;
                    btn.innerHTML = '<i class="ph ph-check-circle text-lg"></i> Guardado Correctamente';
                    btn.className = "w-2/3 bg-green-500 text-white font-bold py-3 rounded text-sm shadow-sm flex items-center justify-center gap-2";
                    
                    setTimeout(() => {
                        if (esModoNuevo) {
                            window.location.href = '/admin/alumnos';
                        } else {
                            window.location.href = '/';
                        }
                    }, 2000);

                } else {
                    estadoBox.className = "flex items-center gap-2 text-red-600 text-sm bg-red-50 p-3 rounded-lg border border-red-100 transition-all duration-300 transform shake";
                    txtEstado.innerHTML = `<b>Error:</b> ${data.mensaje}`;
                    btn.innerHTML = '<i class="ph ph-scan text-lg"></i> Reintentar Escaneo';
                    btn.className = "w-2/3 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded text-sm flex items-center justify-center gap-2 cursor-pointer transition-colors";
                    btn.disabled = false;
                    btn.setAttribute('onclick', 'iniciarEscaneo()');
                }
            } catch (error) {
                console.error("Error al registrar:", error);
                estadoBox.className = "flex items-center gap-2 text-red-600 text-sm bg-red-50 p-3 rounded-lg border border-red-100";
                txtEstado.innerHTML = `<b>Error de red:</b> No se pudo conectar con el servidor.`;
                setTimeout(() => { iniciarEscaneo(); }, 3000);
            }
        }

        window.onclick = function(e) {
            if (!e.target.closest('#busqueda-input')) {
                document.getElementById('resultados-busqueda').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
